[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mysqli",
  "php82Extensions.mbstring",
  "php82Extensions.gd",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "composer"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
  "php -r \"echo 'mysqli: ' . (function_exists('mysqli_connect') ? 'OK' : 'MISSING') . PHP_EOL;\""
]

[start]
cmd = "php82 -d extension=mysqli -d extension=pdo_mysql -S 0.0.0.0:$PORT -t ."