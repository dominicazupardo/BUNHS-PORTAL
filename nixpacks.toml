[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.mysqlnd",
  "php82Extensions.mysqli",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.gd",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "composer"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
  "php82 -m | grep mysqli || (echo 'ERROR: mysqli extension missing!' && exit 1)",
  "php82 -m | grep pdo_mysql || (echo 'ERROR: pdo_mysql extension missing!' && exit 1)",
  "echo 'PHP extensions verified. Ready for deployment.'"
]

[start]
cmd = "exec php82 -S 0.0.0.0:8080 -t ."